<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一筆畫修復互動遊戲 - 首頁</title>
    <style>
        body {
            font-family: "微軟正黑體", sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .container {
            background: white;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 600px;
        }
        h1 { color: #333; font-size: 2.5em; margin-bottom: 10px; }
        .subtitle { color: #007bff; font-weight: bold; margin-bottom: 20px; font-size: 1.2em; }
        .description { color: #666; line-height: 1.6; margin-bottom: 40px; text-align: left; }
        
        .next-btn {
            background-color: #007bff;
            color: white;
            padding: 15px 40px;
            font-size: 1.2em;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-block;
        }
        .next-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.4);
            background-color: #0056b3;
        }
        .authors { margin-top: 30px; font-size: 0.9em; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <h1>一筆畫修復互動遊戲</h1>
        <div class="subtitle">基於多重圖擴充與匹配演算法</div>
        
        <div class="description">
            <p>歡迎進入本專題的互動驗證系統。</p>
            <p>本系統將學術上的「多重圖擴充」、「尤拉迴圈」、「完美匹配」與「漢米爾頓迴圈」等圖論難題，轉化為視覺化的動態修復流程。</p>
        </div>

        <a href="/tutorial" class="next-btn">閱讀遊戲說明 ➔</a>
        
        <div class="authors">專題成員: 黃恩皙、方尚維、蘇仲威</div>
    </div>
</body>
</html>
